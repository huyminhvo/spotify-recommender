[tool.black]
line-length = 100
target-version = ["py312"]
extend-exclude = '''
/(
    \.dataset_cache
  | \.pytest_tmp.*
  | data
  | venv
)/
'''

[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = [
    ".dataset_cache",
    ".pytest_tmp*",
    "data",
    "venv",
]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "UP", "C4", "SIM", "PIE", "RET", "RUF", "T20"]

[tool.ruff.lint.per-file-ignores]
"scripts/*.py" = ["E402", "T201"]
"utils/terminal_progress.py" = ["T201"]
"webapp/*.py" = ["E402"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-ra --strict-config --strict-markers"
filterwarnings = ["error"]
xfail_strict = true
